<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #13161f; --surface2: #1a1e2b;
      --border: #252a3a; --accent: #4fffb0; --accent2: #7b61ff;
      --danger: #ff4f6d; --text: #e8eaf2; --muted: #5a607a;
    }
    body { background: var(--bg); color: var(--text); font-family: monospace; font-size: 14px; min-height: 100vh; }
    header { background: rgba(13,15,20,0.95); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-weight: 800; font-size: 18px; display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }
    main { max-width: 1100px; margin: 0 auto; padding: 32px 20px; display: grid; grid-template-columns: 300px 1fr; gap: 24px; align-items: start; }
    .stats { grid-column: 1/-1; display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 8px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
    .stat-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--accent); margin: 4px 0; }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
    .panel-title { font-weight: 700; font-size: 14px; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: monospace; font-size: 13px; padding: 9px 11px; outline: none; }
    input:focus, select:focus { border-color: var(--accent2); }
    select option { background: var(--surface2); }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 7px; cursor: pointer; font-family: monospace; font-size: 13px; font-weight: 600; background: var(--accent); color: #0d0f14; margin-top: 4px; }
    .btn:hover { background: #6fffc3; }
    .toast { font-size: 12px; padding: 8px 12px; border-radius: 6px; margin-top: 10px; display: none; }
    .toast.error  { background: rgba(255,79,109,0.1); border: 1px solid rgba(255,79,109,0.3); color: var(--danger); display: block; }
    .toast.success { background: rgba(79,255,176,0.08); border: 1px solid rgba(79,255,176,0.2); color: var(--accent); display: block; }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .table-head { padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .table-head span { font-weight: 700; font-size: 14px; }
    .search input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: monospace; font-size: 12px; padding: 6px 10px; outline: none; width: 180px; }
    table { width: 100%; border-collapse: collapse; }
    thead th { text-align: left; padding: 9px 14px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); background: var(--surface2); border-bottom: 1px solid var(--border); }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 11px 14px; font-size: 13px; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border); color: var(--accent2); background: rgba(123,97,255,0.08); }
    .btn-del { background: transparent; border: 1px solid transparent; color: var(--muted); border-radius: 5px; cursor: pointer; font-size: 14px; padding: 3px 7px; }
    .btn-del:hover { color: var(--danger); border-color: rgba(255,79,109,0.3); }
    .empty { padding: 40px; text-align: center; color: var(--muted); }
    footer { border-top: 1px solid var(--border); padding: 12px 32px; color: var(--muted); font-size: 11px; display: flex; justify-content: space-between; margin-top: 20px; }
    @media(max-width:768px){ main { grid-template-columns: 1fr; } .stats { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>
<header>
  <div class="logo"><span class="dot"></span> Student Manager</div>
  <span style="font-size:11px;color:var(--muted)">v1.0.0</span>
</header>
<main>
  <div class="stats">
    <div class="stat-card"><div class="stat-label">Total étudiants</div><div class="stat-value" id="statTotal">—</div></div>
    <div class="stat-card"><div class="stat-label">Filières</div><div class="stat-value" id="statFilieres">—</div></div>
    <div class="stat-card"><div class="stat-label">Niveaux</div><div class="stat-value" id="statNiveaux">—</div></div>
  </div>
  <aside>
    <div class="panel">
      <div class="panel-title">✦ Ajouter un étudiant</div>
      <div class="form-group"><label>Nom</label><input type="text" id="nom" placeholder="Dupont" /></div>
      <div class="form-group"><label>Prénom</label><input type="text" id="prenom" placeholder="Alice" /></div>
      <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="alice@univ.tn" /></div>
      <div class="form-group"><label>Filière</label><input type="text" id="filiere" placeholder="Informatique" /></div>
      <div class="form-group"><label>Niveau</label>
        <select id="niveau"><option value="">— choisir —</option><option>L1</option><option>L2</option><option>L3</option><option>M1</option><option>M2</option></select>
      </div>
      <div id="msg" class="toast"></div>
      <button class="btn" onclick="addStudent()">+ Ajouter</button>
    </div>
  </aside>
  <section>
    <div class="table-wrap">
      <div class="table-head">
        <span>Liste des étudiants</span>
        <div class="search"><input type="text" id="search" placeholder="Rechercher…" oninput="filterTable()" /></div>
      </div>
      <table><thead><tr><th>#</th><th>Nom & Prénom</th><th>Email</th><th>Filière</th><th>Niveau</th><th></th></tr></thead>
      <tbody id="tbody"><tr><td colspan="6"><div class="empty">Chargement…</div></td></tr></tbody></table>
    </div>
  </section>
</main>
<footer><span>Student Manager — 3-Tiers</span><span id="apiStatus">Connexion…</span></footer>
<script>
  const API = '/api';
  let all = [];
  async function load() {
    try {
      const [students, stats] = await Promise.all([
        fetch(API+'/students').then(r=>r.json()),
        fetch(API+'/stats').then(r=>r.json())
      ]);
      all = students;
      renderTable(students);
      document.getElementById('statTotal').textContent = stats.total;
      document.getElementById('statFilieres').textContent = stats.par_filiere.length;
      document.getElementById('statNiveaux').textContent = stats.par_niveau.length;
      document.getElementById('apiStatus').textContent = '● API connectée';
      document.getElementById('apiStatus').style.color = 'var(--accent)';
    } catch(e) {
      document.getElementById('apiStatus').textContent = '● API hors ligne';
      document.getElementById('apiStatus').style.color = 'var(--danger)';
      renderTable([]);
    }
  }
  function renderTable(list) {
    const tb = document.getElementById('tbody');
    if (!list.length) { tb.innerHTML='<tr><td colspan="6"><div class="empty">Aucun étudiant</div></td></tr>'; return; }
    tb.innerHTML = list.map((s,i)=>`<tr>
      <td style="color:var(--muted)">${String(i+1).padStart(2,'0')}</td>
      <td>${s.nom} ${s.prenom}</td><td style="color:var(--muted);font-size:12px">${s.email}</td>
      <td>${s.filiere}</td><td><span class="badge">${s.niveau}</span></td>
      <td><button class="btn-del" onclick="del(${s.id},this)">✕</button></td>
    </tr>`).join('');
  }
  async function addStudent() {
    const msg = document.getElementById('msg');
    msg.className = 'toast';
    const nom=document.getElementById('nom').value.trim(),
          prenom=document.getElementById('prenom').value.trim(),
          email=document.getElementById('email').value.trim(),
          filiere=document.getElementById('filiere').value.trim(),
          niveau=document.getElementById('niveau').value;
    if (!nom||!prenom||!email||!filiere||!niveau) { msg.textContent='Remplir tous les champs.'; msg.className='toast error'; return; }
    try {
      const r = await fetch(API+'/students',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nom,prenom,email,filiere,niveau})});
      const d = await r.json();
      if (!r.ok) { msg.textContent=d.error; msg.className='toast error'; return; }
      msg.textContent='Étudiant ajouté !'; msg.className='toast success';
      ['nom','prenom','email','filiere'].forEach(id=>document.getElementById(id).value='');
      document.getElementById('niveau').value='';
      load();
    } catch(e) { msg.textContent='Erreur réseau'; msg.className='toast error'; }
  }
  async function del(id, btn) {
    if (!confirm('Supprimer ?')) return;
    btn.disabled=true;
    await fetch(API+'/students/'+id,{method:'DELETE'});
    load();
  }
  function filterTable() {
    const q = document.getElementById('search').value.toLowerCase();
    renderTable(all.filter(s=>(s.nom+s.prenom+s.email+s.filiere+s.niveau).toLowerCase().includes(q)));
  }
  load();
  setInterval(load, 30000);
</script>
</body>
</html>
