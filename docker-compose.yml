services:

  db:
    image: postgres:16-alpine
    container_name: student_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-student_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-student_pass}
      POSTGRES_DB:       ${POSTGRES_DB:-student_db}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-student_user} -d ${POSTGRES_DB:-student_db}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: student_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-student_user}:${POSTGRES_PASSWORD:-student_pass}@db:5432/${POSTGRES_DB:-student_db}
      SECRET_KEY:   ${SECRET_KEY:-change-me-in-production}
      FLASK_ENV:    ${FLASK_ENV:-production}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 40s

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: student_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - internal
    depends_on:
      - backend

networks:
  internal:
    driver: bridge
    name: student_network

volumes:
  db_data:
    name: student_db_data
